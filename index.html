<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fase 1: Control de Estilo</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f4f8;
        }
        h1 {
            color: #0070f3; /* El azul clásico de Vercel */
            font-size: 3rem;
        }
        .status-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="status-card">
        <h1>Conexión Exitosa</h1>
        <p>Edgardo, eres la verga parada y este cambio se desplegó vía <strong>GitHub → Vercel</strong>.</p>
    </div>
    <section id="contacto" style="margin-top: 50px; text-align: center;">
        <h2>¿Listo para el siguiente nivel?</h2>
        <form style="display: inline-block; text-align: left;">
            <label>Tu Nombre:</label><br>
            <input type="text" name="nombre" placeholder="Ej. Edgardo" required><br><br>
            <label>Tu Email:</label><br>
            <input type="email" name="email" placeholder="tu@email.com" required><br><br>
            <button type="submit" style="background: #0070f3; color: white; border: none; padding: 10px 20px; border-radius: 5px;">
                Enviar Datos
            </button>
        </form>
    </section>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  // Intentamos inicializar inmediatamente después de que cargue el script
  function inicializarCRM() {
    console.log("Intentando conectar con Supabase...");
    
    // Cambié los nombres para que sean imposibles de duplicar
    const DB_URL = 'https://suzgtbbntvdksyxytlgn.supabase.co';
    const DB_KEY = 'sb_publishable_QTeQFdT8YNi7L_BNJTRNwA_iPhFkipB';

    if (typeof supabase === 'undefined') {
      console.error("❌ ERROR: La librería Supabase no está disponible en el navegador.");
      return;
    }

    const supabaseAdmin = supabase.createClient(DB_URL, DB_KEY);
    console.log("✅ Conexión preparada.");

    const elFormulario = document.querySelector('form');
    
    elFormulario.onsubmit = async function(e) {
      e.preventDefault();
      console.log("🚀 Enviando datos...");

      const fd = new FormData(elFormulario);
      const registro = {
        nombre: fd.get('nombre'),
        email: fd.get('email')
      };

      const { error } = await supabaseAdmin
        .from('contactos')
        .insert([registro]);

      if (error) {
        console.error("❌ Error al guardar:", error.message);
        alert("Error: " + error.message);
      } else {
        console.log("🎉 ¡Éxito en la base de datos!");
        alert("¡Gracias! Pronto nos contactaremos.");
        elFormulario.reset();
      }
    };
  }

  // Ejecutamos cuando el navegador diga que está listo
  window.addEventListener('DOMContentLoaded', inicializarCRM);
</script>
</body>
</html>
