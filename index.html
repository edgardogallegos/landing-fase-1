<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fase 1: Control de Estilo</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f4f8;
        }
        h1 {
            color: #0070f3; /* El azul clásico de Vercel */
            font-size: 3rem;
        }
        .status-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="status-card">
        <h1>Conexión Exitosa</h1>
        <p>Edgardo, eres la verga parada y este cambio se desplegó vía <strong>GitHub → Vercel</strong>.</p>
    </div>
    <section id="contacto" style="margin-top: 50px; text-align: center;">
        <h2>¿Listo para el siguiente nivel?</h2>
        <form style="display: inline-block; text-align: left;">
            <label>Tu Nombre:</label><br>
            <input type="text" name="nombre" placeholder="Ej. Edgardo" required><br><br>
            <label>Tu Email:</label><br>
            <input type="email" name="email" placeholder="tu@email.com" required><br><br>
            <button type="submit" style="background: #0070f3; color: white; border: none; padding: 10px 20px; border-radius: 5px;">
                Enviar Datos
            </button>
        </form>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseUrl = 'https://suzgtbbntvdksyxytlgn.supabase.coQUI';
  const supabaseKey = 'sb_publishable_QTeQFdT8YNi7L_BNJTRNwA_iPhFkipBQUI';
  
  // Usamos un nombre distinto para la instancia para evitar el error de la consola
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  const formulario = document.querySelector('form');

  formulario.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(formulario);
    const datosEnvio = {
      nombre: formData.get('nombre'),
      email: formData.get('email')
    };

    // Usamos supabaseClient aquí también
    const { data, error } = await supabaseClient
      .from('contactos')
      .insert([datosEnvio]);

    if (error) {
      alert('Error: ' + error.message);
    } else {
      alert('¡Éxito!');
      formulario.reset();
    }
  });
  // 2. Seleccionamos el formulario del DOM
  const formulario = document.querySelector('form');

  // 3. Escuchamos cuando el usuario le da a "Enviar"
  formulario.addEventListener('submit', async (e) => {
    e.preventDefault(); // Evita que la página se recargue

    // Extraemos los datos del formulario
    const formData = new FormData(formulario);
    const datosEnvio = {
      nombre: formData.get('nombre'),
      email: formData.get('email')
    };

    // 4. Enviamos a la tabla 'contactos' de Supabase
    const { data, error } = await supabase
      .from('contactos')
      .insert([datosEnvio]);

    if (error) {
      alert('Error al enviar: ' + error.message);
    } else {
      alert('¡Datos guardados con éxito, Edgardo!');
      formulario.reset(); // Limpia el formulario
    }
  });
</script>
</body>
</html>
